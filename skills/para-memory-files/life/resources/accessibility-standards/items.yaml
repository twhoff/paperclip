- id: a11y-004
  fact: "File inputs must never be hidden with hidden class. Use sr-only instead so they remain accessible to screen readers. Wrap in a proper <label htmlFor> and give the input aria-label and aria-describedby."
  category: standard
  timestamp: "2026-04-22"
  source: "GRO-393"
  status: active
  last_accessed: "2026-04-22"
  access_count: 1

- id: a11y-005
  fact: "Decorative icons and SVGs must have aria-hidden=true. This prevents them from becoming pseudo-controls and reduces noise for screen reader users."
  category: standard
  timestamp: "2026-04-22"
  source: "GRO-393"
  status: active
